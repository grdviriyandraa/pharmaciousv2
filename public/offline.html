<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0F766E" />
  <title>Offline · AMERTA QG</title>
  <link rel="icon" href="/icon-192.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: grid; place-items: center;
      background: #FAFAF6; color: #1C1917;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 380px; text-align: center;
      background: #fff; border: 1px solid #E7E5E0; border-radius: 20px;
      padding: 40px 32px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .logo {
      width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 20px;
      background: #0F766E; display: grid; place-items: center;
    }
    h1 { font-size: 20px; font-weight: 650; margin-bottom: 8px; }
    p { font-size: 14px; color: #78716C; line-height: 1.55; }
    .hint {
      margin-top: 14px; padding: 10px 12px; border-radius: 12px;
      background: #F0FDF9; border: 1px solid rgba(15,118,110,.2);
      font-size: 12.5px; color: #115E59;
    }
    button {
      margin-top: 20px; width: 100%; padding: 11px 16px; border: 0; cursor: pointer;
      border-radius: 12px; background: #0F766E; color: #fff;
      font-size: 14px; font-weight: 550; font-family: inherit;
    }
    button:hover { background: #115E59; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
      </svg>
    </div>
    <h1>Anda sedang offline</h1>
    <p>Halaman ini belum tersimpan di perangkat. Sambungkan kembali internet, atau buka halaman yang pernah dikunjungi.</p>
    <div class="hint">Inspeksi AI tetap bisa dipakai offline — modelnya berjalan di perangkat ini.</div>
    <button onclick="location.href='/inspection'">Buka Inspeksi AI</button>
    <button onclick="location.reload()" style="background:#fff;color:#1C1917;border:1px solid #E7E5E0;margin-top:10px">Coba lagi</button>
  </div>
</body>
</html>
